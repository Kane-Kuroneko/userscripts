name: Build on Release
permissions:
   contents: write

on:
   release:
      types: [created]   # 改成 created（draft 也会触发）

jobs:
   build:
      runs-on: ubuntu-latest
      
      steps:
         - name: Checkout repository
           uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: '20'

         - name: Install dependencies
           run: npm install

         - name: Install sub-project dependencies
           working-directory: projects/switch520-auto-secret
           run: npm install

         - name: Build project
           working-directory: projects/switch520-auto-secret
           run: npm run build

         - name: Create patch-notes.html from release body
           uses: actions/github-script@v7
           with:
              script: |
                 const fs = require('fs');
                 const body = context.payload.release.body || 'No release notes provided.';
                 fs.writeFileSync('patch-notes.html', body, 'utf8');

         - name: Commit patch-notes.html to patch-notes branch
           uses: stefanzweifel/git-auto-commit-action@v5
           with:
              branch: patch-notes
              commit_message: 'chore: update patch-notes.html from release ${{ github.event.release.tag_name }}'
              file_pattern: patch-notes.html
              create_branch: true

         - name: Upload build artifacts to release
           uses: softprops/action-gh-release@v2
           with:
              files: |
                 projects/switch520-auto-secret/dist/**
              # 注意：不需要再加 release-notes.html，因为它已提交到 patch-notes 分支
         
         # ==================== 新增：上传完毕后自动发布 Release ====================
         - name: Publish release (触发 GreasyFork webhook)
           uses: actions/github-script@v7
           with:
              script: |
                 const { owner, repo } = context.repo;
                 const releaseId = context.payload.release.id;
                 await github.rest.repos.updateRelease({
                   owner,
                   repo,
                   release_id: releaseId,
                   draft: false,        # 关键：从 draft 改为 published
                   prerelease: context.payload.release.prerelease
                 });
                 console.log('✅ Release published! GreasyFork webhook will be triggered now.');
